<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="Yoonow Technologies">
  <title>Yoonow Technologies</title>
  <defs>
    <linearGradient id="D-bdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b2c"/>
      <stop offset="100%" stop-color="#3d8bff"/>
    </linearGradient>
    <linearGradient id="D-shield" x1="0" y1="0" x2="0" y2="1">
